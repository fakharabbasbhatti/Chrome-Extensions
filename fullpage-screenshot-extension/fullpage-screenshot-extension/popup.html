<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Page Screenshot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header__icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21,15 16,10 5,21"/>
        </svg>
      </div>
      <div class="header__text">
        <h1 class="header__title">Screenshot</h1>
        <span class="header__sub">Full Page Capture</span>
      </div>
    </header>

    <!-- Main capture panel -->
    <main class="main" id="panel-capture">
      <p class="description">Scrolls through the entire page and stitches a single PNG — no visible area limit.</p>

      <button class="btn btn--primary" id="btn-capture">
        <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M20.94 11A9 9 0 1 1 12 3a9 9 0 0 1 8.94 8z"/>
        </svg>
        Capture Full Page
      </button>
    </main>

    <!-- Loading panel -->
    <div class="panel hidden" id="panel-loading">
      <div class="loader">
        <div class="loader__ring"></div>
      </div>
      <p class="loader__label" id="loading-text">Preparing capture…</p>
      <div class="progress-bar">
        <div class="progress-bar__fill" id="progress-fill"></div>
      </div>
      <p class="progress-label" id="progress-label">0%</p>
    </div>

    <!-- Preview panel -->
    <div class="panel hidden" id="panel-preview">
      <div class="preview-wrap">
        <img class="preview-img" id="preview-img" src="" alt="Full page screenshot preview" />
      </div>
      <p class="meta-text" id="meta-text"></p>
      <div class="btn-row">
        <button class="btn btn--primary" id="btn-download">
          <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download PNG
        </button>
        <button class="btn btn--ghost" id="btn-recapture">
          <svg class="btn__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1,4 1,10 7,10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
          </svg>
          New Capture
        </button>
      </div>
    </div>

    <!-- Error panel -->
    <div class="panel hidden" id="panel-error">
      <div class="error-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="error-title">Capture Failed</p>
      <p class="error-msg" id="error-msg">Something went wrong.</p>
      <button class="btn btn--ghost btn--sm" id="btn-retry">Try Again</button>
    </div>

  </div>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
